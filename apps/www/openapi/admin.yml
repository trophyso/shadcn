          example: revenue-champions
        description:
          type: string
          description: The leaderboard description.
          example: Ranked by monthly revenue
        status:
          type: string
          enum:
            - inactive
            - active
            - scheduled
            - finished
          default: inactive
          description: The initial user-facing status. Defaults to `inactive`. Use `scheduled` for leaderboards that should be active in the future and `finished` only when creating a leaderboard with an end date in the past.
