      title: CreatePointsBoostsRequest
      type: array
      description: Array of points boosts to create. Maximum 100 boosts per request. Each boost may optionally target a specific user via `userId` or filter by user attributes via `userAttributes`. These two fields are mutually exclusive — providing `userAttributes` when `userId` is set will result in an error. Omitting both creates a global boost.
      items:
        $ref: '#/components/schemas/CreatePointsBoostRequestItem'
      maxItems: 100
      minItems: 1
