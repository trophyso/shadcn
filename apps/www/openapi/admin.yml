        metricId:
          type: string
          format: uuid
          description: The metric ID to rank by when `rankBy` is `metric`.
        pointsSystemId:
          type: string
          format: uuid
          description: The points system ID to rank by when `rankBy` is `points`.
        maxParticipants:
          type: integer
          minimum: 1
          maximum: 1000
          default: 1000
          description: The maximum number of participants. Defaults to `1000`.
          example: 100
        start:
          type: string
          format: date
          description: The leaderboard start date in YYYY-MM-DD format. Defaults to today when omitted.
