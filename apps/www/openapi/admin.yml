              },
              {
                name: 'Revenue',
                key: 'revenue',
                unitType: 'currency',
                units: 'USD'
              }
            ]);
        - lang: python
          source: |
            from trophy import TrophyApi

            client = TrophyApi(api_key='YOUR_API_KEY')

            response = client.admin.metrics.create([
              {
                "name": "Invites Sent",
                "key": "invites-sent"
              },
              {
                "name": "Revenue",
                "key": "revenue",
                "unitType": "currency",
                "units": "USD"
              }
            ])
      requestBody:
        description: Array of metrics to create. Maximum 100 metrics per request.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMetricsRequest'
            examples:
              Create number and currency metrics:
                value:
                  - name: Invites Sent
                    key: invites-sent
                  - name: Revenue
                    key: revenue
                    unitType: currency
                    units: USD
