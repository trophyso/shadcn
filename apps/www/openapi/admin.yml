components:
  schemas:
    ErrorBody:
      title: ErrorBody
      type: object
      properties:
        error:
          type: string
      required:
        - error
    CreateStreakFreezesRequest:
      title: CreateStreakFreezesRequest
      type: object
      description: Request body for creating streak freezes.
      properties:
        freezes:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                description: The ID of the user to create a freeze for.
                example: user-123
            required:
              - userId
          description: Array of freezes to create. Maximum 100 freezes per request.
          maxItems: 100
          minItems: 1
      required:
        - freezes
    CreateStreakFreezesResponse:
      title: CreateStreakFreezesResponse
      type: object
      description: Response containing any issues encountered while creating streak freezes.
      properties:
        issues:
          type: array
          items:
            $ref: '#/components/schemas/AdminIssue'
          description: Array of issues encountered during freeze creation.
      required:
        - issues
    CreateAttributesRequest:
      title: CreateAttributesRequest
      type: array
      description: Request body for creating attributes.
      items:
        $ref: '#/components/schemas/CreateAttributeRequestItem'
      minItems: 1
      maxItems: 100
    CreateAttributeRequestItem:
      title: CreateAttributeRequestItem
      type: object
      description: An attribute to create.
      properties:
        name:
          type: string
          description: The attribute name.
          example: Plan
        key:
          type: string
          pattern: '^[a-zA-Z\d-_]+$'
          description: The attribute key. Only alphanumeric characters, hyphens, and underscores are permitted.
          example: plan
        type:
          type: string
          enum:
            - user
            - event
          description: The attribute type.
          example: user
      required:
        - name
        - key
        - type
    AdminAttribute:
      title: AdminAttribute
      type: object
      description: An attribute returned from the admin attributes endpoints.
      properties:
        id:
          type: string
          format: uuid
          description: The UUID of the attribute.
        name:
          type: string
          description: The attribute name.
        key:
          type: string
          description: The attribute key.
        type:
          type: string
          enum:
            - user
            - event
          description: The attribute type.
      required:
        - id
        - name
        - key
        - type
    CreateAttributesResponse:
      title: CreateAttributesResponse
      type: object
      description: Response containing created attributes and any per-item issues.
      properties:
        created:
          type: array
          items:
            $ref: '#/components/schemas/AdminAttribute'
          description: Array of successfully created attributes.
        issues:
          type: array
          items:
            $ref: '#/components/schemas/AdminIssue'
          description: Array of issues encountered during attribute creation.
      required:
        - created
        - issues
    UpdateAttributesRequest:
      title: UpdateAttributesRequest
      type: array
      description: Request body for updating attributes.
      items:
        $ref: '#/components/schemas/UpdateAttributeRequestItem'
      minItems: 1
      maxItems: 100
    UpdateAttributeRequestItem:
      title: UpdateAttributeRequestItem
      type: object
      description: 'An attribute update object. `id` is required and `name` is optional. `key` and `type` cannot be changed through this endpoint.'
      properties:
        id:
